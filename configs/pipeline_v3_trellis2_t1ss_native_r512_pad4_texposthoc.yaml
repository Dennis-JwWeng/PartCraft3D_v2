# =====================================================================
# Pipeline v3 — TRELLIS.1-SS NATIVE (in-process), 512, pad4, FULL texture
# =====================================================================
# S1 = TRELLIS.1's SS flow + DINOv2 cond IN-PROCESS (trellis2_s1_ss_model: t1,
# partcraft/pipeline_v3/trellis1_ss.py) — masked edit_grid with pad=4 dilation +
# same-frame 64³ restore.  S2 = TRELLIS.2 SHAPE *and* TEXTURE, both with the
# masked PER-STEP anchor (s2_anchor_mode: perstep).  edit_res=512.  NO white-model
# → the texture stage runs and decode_latent emits a fully textured 512 mesh; GLB
# is written.  No offline bridge (no trellis2_ss1_coords_dir / run_t1 / vinedresser3d).
#
# Run (single trellis2 env, no offline prep; seed the output tree first):
#   bash scripts/experiments/seed_masked_e512_variant.sh \
#        data/Pxform_v2/_exp_t1ss_native_r512_pad2_restore \
#        data/Pxform_v2/_exp_t1ss_native_r512_pad4_texposthoc
#   SHARD=08 OBJ_IDS_FILE=data/Pxform_v2/_exp_masked_perstep_r512_pad0/seeded_ids.txt FORCE=1 \
#   STAGES=trellis2_preview MACHINE_ENV=configs/machine/local_trellis2.env PIPELINE_GPUS="0,1" \
#     bash run_pipeline_v3_shard_trellis2.sh shard08_t1native_pad4 \
#          configs/pipeline_v3_trellis2_t1ss_native_r512_pad4_full.yaml
# =====================================================================

blender: /mnt/zsn/zsn_workspace/VoxHammer/third_party/blender-4.2.19-linux-x64/blender
ckpt_root: /mnt/zsn/ckpts/TRELLIS.2-4B

data:
  output_dir: data/Pxform_v2/_exp_t1ss_native_r512_pad4_texposthoc   # T1-SS arm (same recipe, T1 flow)
  mesh_root:   data/partverse/inputs/mesh
  images_root: data/partverse/inputs/images

pipeline:
  gpus: [0, 1, 2, 3, 4, 5, 6, 7]   # all 8 GPUs → 8-way parallel 3D edit

  vlm_port_base: 8200
  vlm_port_stride: 1
  flux_port_base: 8020
  flux_port_stride: 1

  prerender_workers: 6
  s6p_del_workers: 6

  stages:
  - name: trellis2_encode
    desc: >
      TRELLIS.2 P1 — encode the ORIGINAL mesh.  trellis2_edit_res=512 ALSO writes
      the grid-512 sidecar (shape/tex_slat_e512.npz, 32³) for the S2 body anchor.
    servers: none
    use_gpus: true
    steps:
    - trellis2_encode

  - name: text_gen_gate_a
    desc: VLM edit generation (Mode A overview) + text-align gate.
    servers: vlm
    steps:
    - gen_edits
    - gate_text_align

  - name: flux_2d
    desc: FLUX 2D image editing.
    servers: flux
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 0
    steps:
    - flux_2d

  - name: gate_2d
    desc: Gate C — VLM judges each FLUX before→after pair.
    servers: vlm
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 1
    steps:
    - gate_2d

  - name: trellis2_preview
    desc: >
      TRELLIS.2 masked latent editing at 512 → edits_3d/<edit_id> latents +
      gate-E before/after named views.
    servers: none
    use_gpus: true
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 2
    steps:
    - trellis2_3d

services:
  vlm:
    model: /mnt/zsn/ckpts/Qwen3.6-27B

  image_edit:
    enabled: true
    image_edit_backend: local_diffusers
    workers_per_server: 2

    trellis2_codebase: /mnt/zsn/3dobject/TRELLIS.2
    trellis2_ckpt:     /mnt/zsn/ckpts/TRELLIS.2-4B

    use_mask: true

    # 512 edit resolution (vs 1024 in _exp_masked_posthoc_r1024).  Same recipe R3 otherwise:
    # masked S1 + contact-soft + TRELLIS.1 SS schedule, but S2 uses the masked
    # PER-STEP anchor (perstep), NOT posthoc — body kept by per-step mask + occupancy restore.
    trellis2_edit_res: 512
    trellis2_canonical_frame: true
    trellis2_s1_mode: masked
    trellis2_s1_contact_soft: true
    trellis2_ss_align_t1: true
    trellis2_s1_ss_model: t1                 # NATIVE in-process TRELLIS.1 SS flow + DINOv2 cond (no bridge)
    trellis2_s2_anchor_mode: perstep        # SHAPE: masked per-step anchor (solid edited part)
    trellis2_s2_tex_anchor_mode: posthoc    # TEXTURE: free gen + final hard-paste of original body material
                                            #   → preserved region keeps its exact original colour/texture
    # ── 512 + pad4 + restore + FULL texture (no white-model) ──
    trellis2_s1_pad: 4                      # Chebyshev box-dilate the 64³ edit grid by 4
    trellis2_s2_restore_preserved: true     # re-insert source body voxels S1 dropped outside the mask
    # force_white_model OFF → S2 texture (masked_tex_slat, perstep) runs → textured 512 mesh decode

    trellis2_pipeline_type: 1024_cascade
    trellis2_seed: 1
    trellis2_num_samples: 1
    trellis2_decimation_target: 1000000
    trellis2_texture_size: 4096
    emit_before: true

    trellis2_emit_glb: false   # GLB not needed — skip the heavy 4096² texture-bake-to-GLB; keep latents + after-views

    trellis2_render_gate_views: true
    trellis2_gate_view_res: 512
    trellis2_encode_render_overview: false

    trellis_workers_per_gpu: 1

qc:
  edit_types: [modification, scale]

  thresholds_by_type:
    deletion:
      min_visual_quality: 3
    modification:
      min_visual_quality: 3
      require_preserve_other: true
    scale:
      min_visual_quality: 3
      require_preserve_other: true
    material:
      min_visual_quality: 3
    color:
      min_visual_quality: 3
    global:
      min_visual_quality: 3
    addition:
      min_visual_quality: 3
