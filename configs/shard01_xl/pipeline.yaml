# =====================================================================
# PartVerse XL shard 01 ONLY — POSTHOC (512, pad4, no 2D QC)
# =====================================================================
# Dedicated config + object lists live under configs/shard01_xl/.
# Use run_shard01_xl.sh (sets SHARD=01, CONFIG, OBJ_IDS_FILE defaults).
#
# Object lists (edit paths here when you change scope):
#   roster.txt      — frozen 2470 ids
#   allow.txt       — preflight pass (2229; drops >16 parts)
#   need_encode.txt — allow minus existing p1_encode/shape_slat_e512.npz
#   block.tsv       — preflight rejects
#
# Recommended phase order (do NOT run end-to-end until encode is full):
#   1) STAGES=trellis2_encode  OBJ_IDS_FILE=configs/shard01_xl/need_encode.txt
#   2) STAGES=text_gen_gate_a,flux_2d,trellis2_preview,gate_quality
#   3) STAGES=del_add
#
# Examples:
#   STAGES=trellis2_encode bash run_shard01_xl.sh xl_s01_enc
#   STAGES=del_add OBJ_IDS_FILE=configs/shard01_xl/allow.txt bash run_shard01_xl.sh xl_s01_del
#
# Refresh lists after roster/preflight changes:
#   bash configs/shard01_xl/refresh_lists.sh
# =====================================================================

blender: /mnt/zsn/zsn_workspace/VoxHammer/third_party/blender-4.2.19-linux-x64/blender
ckpt_root: /mnt/zsn/ckpts/TRELLIS.2-4B

data:
  # Raw PartVerse XL source — read STRAIGHT from meshes/textured_part_glbs +
  # captions, NO pack / no per-object NPZ (scripts/data_prep/mesh_sources.py
  # RawXLSource).  full.glb is assembled in-memory on first access (same
  # assembler the pack used → byte-identical), part_N.glb served from raw bytes,
  # part_captions.json derived from captions/<uuid>/caption.json.  Part labels
  # therefore come from CAPTIONS (not anno_info).  Sharding is a pure runtime
  # partition of the (textured ∩ captioned) id list — no data moves on disk.
  source:     partversexl_raw
  xl_root:    /mnt/zsn/data/partversexl
  num_shards: 10
  output_dir: data/Pxform_v2/partversexl_posthoc_no2dqc
  xl_preflight:
    enabled: true
    max_parts: 16
    filter: true
    strict: false
    check_assemble: false

pipeline:
  gpus: [0, 1, 2, 3, 4, 5, 6, 7]

  vlm_port_base: 8200
  vlm_port_stride: 1
  flux_port_base: 8020
  flux_port_stride: 1

  prerender_workers: 6
  s6p_del_workers: 6

  stages:
  - name: trellis2_encode
    desc: >
      TRELLIS.2 P1 — encode the ORIGINAL mesh.  trellis2_edit_res=512 ALSO writes
      the grid-512 sidecar (shape/tex_slat_e512.npz, 32³) for the S2 body anchor.
    servers: none
    use_gpus: true
    steps:
    - trellis2_encode

  - name: text_gen_gate_a
    desc: VLM edit generation (Mode A overview) + text-align gate.
    servers: vlm
    steps:
    - gen_edits
    - gate_text_align

  - name: flux_2d
    desc: FLUX 2D image editing.
    servers: flux
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 0
    steps:
    - flux_2d

  # gate_2d (Gate C) REMOVED — no 2D QC.  build_prereq_map() sees no gate_2d in
  # the active steps → gate_c_active=False → trellis2_3d (s5) falls back to the
  # gate_a prerequisite, so every FLUX 2D edit proceeds to the 3D edit.

  - name: trellis2_preview
    desc: >
      TRELLIS.2 masked latent editing at 512 → edits_3d/<edit_id> latents +
      gate-E before/after named views.
    servers: none
    use_gpus: true
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 1
    steps:
    - trellis2_3d

  - name: gate_quality
    desc: >
      Gate E — VLM visual-quality judge.  Reads the before/after named views
      produced by trellis2_preview (gate_views/before_view_*,
      edits_3d/<id>/after_view_*, both PbrMeshRenderer white bg), builds the
      2x5 before/after collage and scores each edit; writes gate_e pass/fail to
      edit_status.json.  Scoped to qc.gate_quality_types (mod/scale).  Own VLM
      batch after the 3D-edit chain, before del_add.
    servers: vlm
    steps:
    - gate_quality

  - name: del_add
    desc: >
      v2-native deletion + inverse-addition latent re-encode at 512.  Per object:
      reads phase1/parsed.json deletion specs (deletion is gate_a-deferred under
      the mod/scale allow-list, so iter_deletion_specs skips it) → merges surviving
      parts into a TEMP after_new.glb (NEVER persisted) → encodes shape+tex SLat
      @512 in the ORIGINAL mesh frame → writes edits_3d/del_*/ and edits_3d/add_*/
      latents/{shape_slat,tex_slat,ss}.npz uniformly with mod/scale, plus 5 named
      after_view_*.png.  best_view = overview-pixel argmax (deletion has no VLM
      best_view).  GPU stage; per-GPU round-robin object slicing via dispatch_gpus.
    servers: none
    use_gpus: true
    steps:
    - del_add

services:
  vlm:
    model: /mnt/zsn/ckpts/Qwen3.6-27B

  image_edit:
    enabled: true
    image_edit_backend: local_diffusers
    workers_per_server: 2

    trellis2_codebase: /mnt/zsn/3dobject/TRELLIS.2
    trellis2_ckpt:     /mnt/zsn/ckpts/TRELLIS.2-4B

    use_mask: true

    # 512 edit resolution.  S1 = masked + contact-soft + TRELLIS.1 SS schedule.
    # S2 SHAPE + TEXTURE both POSTHOC-RESTORE → free gen (solid edited part) +
    # hard-paste the P1-encoded ORIGINAL latents on preserved tokens; ZERO flow
    # inversion in S2 (both invert_clean passes skipped) → faster + solid part.
    trellis2_edit_res: 512
    trellis2_canonical_frame: true
    trellis2_s1_mode: masked
    trellis2_s1_contact_soft: true
    trellis2_ss_align_t1: true
    trellis2_s1_ss_model: t1                 # NATIVE in-process TRELLIS.1 SS flow + DINOv2 cond (no bridge)
    trellis2_s2_anchor_mode: posthoc        # SHAPE: posthoc-RESTORE — free gen (SOLID part) + hard-paste
                                            #   P1-encoded original body latent (shape_slat_e512.npz) on preserved
                                            #   tokens; SKIPS shape invert_clean (the shape twin of tex restore)
    trellis2_s2_tex_anchor_mode: posthoc    # TEXTURE: posthoc-RESTORE — free gen + hard-paste the P1-ENCODED
                                            #   original tex latent (tex_slat_e512.npz) onto preserved tokens
                                            #   (auto-engaged because the encoded before-tex sidecar exists);
                                            #   already does NO flow inversion → preserved region = EXACT material
    # ── 512 + pad4 + restore + FULL texture (no white-model) ──
    trellis2_s1_pad: 4                      # Chebyshev box-dilate the 64³ edit grid by 4
    trellis2_s2_restore_preserved: true     # re-insert source body voxels S1 dropped outside the mask
    # force_white_model OFF → S2 texture (masked_tex_slat, posthoc-restore) runs → textured 512 mesh decode

    trellis2_seed: 1                        # masked-edit sampler seed
    trellis2_decimation_target: 1000000     # only used when trellis2_emit_glb: true
    trellis2_texture_size: 4096             # only used when trellis2_emit_glb: true
    emit_before: true

    trellis2_emit_glb: false   # GLB not needed — skip the heavy 4096² texture-bake-to-GLB; keep latents + after-views
    trellis2_save_latents: true  # inline ss_latent + mask during trellis2_3d / del_add (XL training export)

    trellis2_render_gate_views: true
    trellis2_gate_view_res: 512
    # Render the 5 named source views (gate_views/before_view_*.png) AT ENCODE
    # time — GPU/pipeline already hot, single-threaded per object with try/except.
    # flux_2d then just LOADS these PNGs (edit_2d.py process_one prefers the saved
    # before_view) instead of doing a concurrent on-the-fly o-voxel render, which
    # segfaulted (non-thread-safe GL + poison meshes). Render-free flux_2d = no
    # crash, no GPU during flux_2d, faster, and PBR-consistent with gate-E.
    trellis2_encode_render_overview: true

    trellis_workers_per_gpu: 1

qc:
  # Active processing allow-list (flux / trellis2_3d / gate_a judge scope).
  edit_types: [modification, scale]

  # Gate E first-pass scope — MUST match edit_types for the pre-del_add judge.
  # del_add runs after this; deletion is never Gate-E-judged; addition optional
  # via a later partial run: QC_ONLY_TYPES=addition STAGES=gate_quality FORCE=1
  gate_quality_types: [modification, scale]

  thresholds_by_type:
    deletion:
      min_visual_quality: 3
    modification:
      min_visual_quality: 3
      require_preserve_other: true
    scale:
      min_visual_quality: 3
      require_preserve_other: true
    material:
      min_visual_quality: 3
    color:
      min_visual_quality: 3
    global:
      min_visual_quality: 3
    addition:
      min_visual_quality: 3
