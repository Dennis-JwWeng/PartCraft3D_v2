# =====================================================================
# Pipeline v3 — TRELLIS.2, GLB-render variant (encode-first)
# =====================================================================
# Same as pipeline_v3_trellis2_partverse.yaml EXCEPT:
#
#   1. ALL pipeline images come from the GLB itself (no Blender, no packed
#      input images):
#        - phase-1 overview (RGB + part highlight)  → o-voxel render
#        - flux_2d best-view input                  → o-voxel render at named view
#        - gate-E before/after                      → PbrMeshRenderer (named views,
#                                                      white bg) — set below.
#      These are the code-default render paths now (partcraft.render.ovox_views /
#      trellis2_ovox_render); this config just turns on the gate-E renders.
#
#   2. `trellis2_encode` is MOVED TO THE FRONT of the whole flow (its own batch
#      before text_gen_gate_a).  The original mesh is processed into its
#      canonical TRELLIS representation up front, once per object, so it is ready
#      before any edit/render stage and never re-encoded mid-chain.
#
# Stage order (this config):
#   trellis2_encode → text_gen_gate_a → flux_2d > gate_2d > trellis2_preview
#
# Run:
#   MACHINE_ENV=configs/machine/local_trellis2.env \
#     bash run_pipeline_v3_shard_trellis2.sh \
#          shard08 configs/pipeline_v3_trellis2_glbrender.yaml
# =====================================================================

# Overview/highlight no longer use Blender (o-voxel render), but other paths
# (del/add, if ever re-enabled) still reference it — kept for compatibility.
blender: /mnt/zsn/zsn_workspace/VoxHammer/third_party/blender-4.2.19-linux-x64/blender
ckpt_root: /mnt/zsn/ckpts/TRELLIS.2-4B

data:
  output_dir: data/Pxform_v2/_exp_flowedit_free_r1024        # INDEPENDENT smoke output subtree
  mesh_root:   data/partverse/inputs/mesh
  images_root: data/partverse/inputs/images

pipeline:
  gpus: [0, 2]        # parallel batch test on 2 GPUs

  vlm_port_base: 8200
  vlm_port_stride: 1
  flux_port_base: 8020
  flux_port_stride: 1

  prerender_workers: 6
  s6p_del_workers: 6

  # Scheduler source of truth -----------------------------------------
  # trellis2_encode is FIRST (solo batch) → encode every object's GLB → shape
  # SLat up front, before any rendering/editing stage.
  stages:
  - name: trellis2_encode
    desc: >
      TRELLIS.2 P1 (MOVED TO FRONT) — encode the ORIGINAL mesh → shape SLat
      (p1_encode/shape_slat.npz).  Front-loaded so the GLB's canonical
      representation exists before overview / flux / gate / 3D-edit stages.
      GPU, no server, runs once per object.
    servers: none
    use_gpus: true
    steps:
    - trellis2_encode

  - name: text_gen_gate_a
    desc: >
      VLM edit generation (Mode A overview) + text-align gate.  The overview
      (RGB top row + part-highlight bottom row) is rendered from the GLB via
      o-voxel — no Blender, no packed images.
    servers: vlm
    steps:
    - gen_edits
    - gate_text_align

  - name: flux_2d
    desc: >
      FLUX 2D image editing.  The best-view input image is rendered from the GLB
      via o-voxel at the gate-A named view.  Scoped to qc.edit_types.
    servers: flux
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 0
    steps:
    - flux_2d

  - name: gate_2d
    desc: >
      Gate C — VLM judges each FLUX before→after pair against the instruction.
      Runs before the 3D edit (trellis2_3d is gated on gate_c==pass).
    servers: vlm
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 1
    steps:
    - gate_2d

  - name: trellis2_preview
    desc: >
      TRELLIS.2 masked latent editing from the FLUX-edited 2D image →
      edits_3d/<edit_id>/after.glb (+ before.glb).  Also renders the gate-E
      before/after named views (PbrMeshRenderer, white bg) when
      trellis2_render_gate_views is on (below).
    servers: none
    use_gpus: true
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 2
    steps:
    - trellis2_3d

  # gate_quality (Gate E) DISABLED for this smoke experiment — we stop after the
  # 3D edit (trellis2_preview).  The gate-E before/after named views are still
  # rendered in trellis2_preview (trellis2_render_gate_views) for manual review;
  # we just don't run the VLM quality judge.  Re-add this stage to re-enable.
  # - name: gate_quality
  #   desc: >
  #     Gate E — VLM visual-quality judge.  Reads the GLB-rendered before/after
  #     named views (gate_views/before_view_*, edits_3d/<id>/after_view_*, both
  #     PbrMeshRenderer white bg) produced by trellis2_preview, builds the 2x5
  #     before/after collage and scores each edit.  Own VLM batch after the chain.
  #   servers: vlm
  #   steps:
  #   - gate_quality

services:
  vlm:
    model: /mnt/zsn/ckpts/Qwen3.6-27B

  image_edit:
    enabled: true
    image_edit_backend: local_diffusers
    workers_per_server: 2

    # ── TRELLIS.2 settings (consumed by trellis2_3d.py) ─────────────
    trellis2_codebase: /mnt/zsn/3dobject/TRELLIS.2
    trellis2_ckpt:     /mnt/zsn/ckpts/TRELLIS.2-4B

    use_mask: true

    # 3D edit method: FlowEdit on the SS (structure) stage + FREE S2 (shape/tex
    # generated without anchoring).  FlowEdit SS uses symmetric guidance and
    # MUST run in the canonical frame (trellis2_canonical_frame: true below).
    trellis2_canonical_frame: true
    trellis2_s1_mode: flowedit
    trellis2_s2_anchor_mode: free

    trellis2_pipeline_type: 1024_cascade
    trellis2_seed: 1
    trellis2_num_samples: 1
    trellis2_decimation_target: 1000000
    trellis2_texture_size: 4096
    emit_before: true

    # Eval-only smoke: SKIP the heavy GLB export (to_glb remesh + 4096 texture
    # bake + webp).  The 3D-edit stage only decodes the latents, saves them
    # (.npz), and renders the named gate views from them — fully latents-level,
    # no GLB asset.  Every review image already comes from decode_latent →
    # render_sample, so nothing visual depends on the GLB.  Set true to emit
    # the editable after.glb asset.
    trellis2_emit_glb: false

    # GLB-render: produce the gate-E before/after named-view renders
    # (PbrMeshRenderer + envmap, white bg) in the GPU stage so gate-E reads
    # files, no GPU in the gate process.
    trellis2_render_gate_views: true
    trellis2_gate_view_res: 512
    # Front-load the UNIFIED PBR overview render into the encode stage: decode
    # the just-encoded latents → realistic RGB + part-mesh segmentation →
    # phase1/overview.png (+ debug + gate before views).  No o-voxel, no Blender.
    trellis2_encode_render_overview: true

    trellis_workers_per_gpu: 1

qc:
  edit_types: [modification, scale]

  thresholds_by_type:
    deletion:
      min_visual_quality: 3
    modification:
      min_visual_quality: 3
      require_preserve_other: true
    scale:
      min_visual_quality: 3
      require_preserve_other: true
    material:
      min_visual_quality: 3
    color:
      min_visual_quality: 3
    global:
      min_visual_quality: 3
    addition:
      min_visual_quality: 3
