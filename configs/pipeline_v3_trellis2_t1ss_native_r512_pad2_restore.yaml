# =====================================================================
# Pipeline v3 — TRELLIS.1-SS NATIVE (in-process), perstep, 512, pad2+restore
# =====================================================================
# IDENTICAL recipe to pipeline_v3_trellis2_masked_perstep_r512_pad2_restore.yaml
# (masked-style edit_grid pad=2 + same-frame restore + perstep S2 + 512 + white),
# EXCEPT S1 runs TRELLIS.1's SS flow + DINOv2 cond IN-PROCESS via
# trellis2_s1_ss_model: t1 (partcraft/pipeline_v3/trellis1_ss.py) — NOT TRELLIS.2's
# SS flow, and NOT the old offline bridge (no trellis2_ss1_coords_dir / run_t1.py /
# vinedresser3d).  trellis2 loads the T1 ss_flow_img_dit_L_16l8 ckpt into its own
# SparseStructureFlowModel + the bundled DINOv2-L; SS VAE / edit region / restore /
# S2 are shared.  Compare vs _exp_t1ss_perstep_r512_pad2_restore (the bridge tree)
# to confirm parity, and vs _exp_masked_perstep_r512_pad2_restore (T2 SS flow).
#
# Run (single trellis2 env, no offline prep):
#   SHARD=08 OBJ_IDS_FILE=data/Pxform_v2/_exp_masked_perstep_r512_pad0/seeded_ids.txt FORCE=1 \
#   STAGES=trellis2_preview MACHINE_ENV=configs/machine/local_trellis2.env PIPELINE_GPUS="0" \
#     bash run_pipeline_v3_shard_trellis2.sh shard08_t1native \
#          configs/pipeline_v3_trellis2_t1ss_native_r512_pad2_restore.yaml
# =====================================================================

blender: /mnt/zsn/zsn_workspace/VoxHammer/third_party/blender-4.2.19-linux-x64/blender
ckpt_root: /mnt/zsn/ckpts/TRELLIS.2-4B

data:
  output_dir: data/Pxform_v2/_exp_t1ss_native_r512_pad2_restore   # T1-SS arm (same recipe, T1 flow)
  mesh_root:   data/partverse/inputs/mesh
  images_root: data/partverse/inputs/images

pipeline:
  gpus: [0, 1, 2, 3, 4, 5, 6, 7]   # all 8 GPUs → 8-way parallel 3D edit

  vlm_port_base: 8200
  vlm_port_stride: 1
  flux_port_base: 8020
  flux_port_stride: 1

  prerender_workers: 6
  s6p_del_workers: 6

  stages:
  - name: trellis2_encode
    desc: >
      TRELLIS.2 P1 — encode the ORIGINAL mesh.  trellis2_edit_res=512 ALSO writes
      the grid-512 sidecar (shape/tex_slat_e512.npz, 32³) for the S2 body anchor.
    servers: none
    use_gpus: true
    steps:
    - trellis2_encode

  - name: text_gen_gate_a
    desc: VLM edit generation (Mode A overview) + text-align gate.
    servers: vlm
    steps:
    - gen_edits
    - gate_text_align

  - name: flux_2d
    desc: FLUX 2D image editing.
    servers: flux
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 0
    steps:
    - flux_2d

  - name: gate_2d
    desc: Gate C — VLM judges each FLUX before→after pair.
    servers: vlm
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 1
    steps:
    - gate_2d

  - name: trellis2_preview
    desc: >
      TRELLIS.2 masked latent editing at 512 → edits_3d/<edit_id> latents +
      gate-E before/after named views.
    servers: none
    use_gpus: true
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 2
    steps:
    - trellis2_3d

services:
  vlm:
    model: /mnt/zsn/ckpts/Qwen3.6-27B

  image_edit:
    enabled: true
    image_edit_backend: local_diffusers
    workers_per_server: 2

    trellis2_codebase: /mnt/zsn/3dobject/TRELLIS.2
    trellis2_ckpt:     /mnt/zsn/ckpts/TRELLIS.2-4B

    use_mask: true

    # 512 edit resolution (vs 1024 in _exp_masked_posthoc_r1024).  Same recipe R3 otherwise:
    # masked S1 + contact-soft + TRELLIS.1 SS schedule, but S2 uses the masked
    # PER-STEP anchor (perstep), NOT posthoc — body kept by per-step mask + occupancy restore.
    trellis2_edit_res: 512
    trellis2_canonical_frame: true
    trellis2_s1_mode: masked
    trellis2_s1_contact_soft: true
    trellis2_ss_align_t1: true
    trellis2_s1_ss_model: t1                 # NATIVE in-process TRELLIS.1 SS flow + DINOv2 cond (no bridge)
    trellis2_s2_anchor_mode: perstep        # masked per-step anchor for S2 shape (NOT posthoc)
    # ── 512+pad2+restore experiment (full proposal) ──
    trellis2_s1_pad: 2                      # Chebyshev box-dilate the 64³ edit grid by 2
    trellis2_s2_restore_preserved: true     # re-insert source body voxels S1 dropped outside the mask
    trellis2_force_white_model: true        # shape-only: stop after S2 shape, decode grey 512 mesh (skip texture)

    trellis2_pipeline_type: 1024_cascade
    trellis2_seed: 1
    trellis2_num_samples: 1
    trellis2_decimation_target: 1000000
    trellis2_texture_size: 4096
    emit_before: true

    trellis2_emit_glb: false

    trellis2_render_gate_views: true
    trellis2_gate_view_res: 512
    trellis2_encode_render_overview: false

    trellis_workers_per_gpu: 1

qc:
  edit_types: [modification, scale]

  thresholds_by_type:
    deletion:
      min_visual_quality: 3
    modification:
      min_visual_quality: 3
      require_preserve_other: true
    scale:
      min_visual_quality: 3
      require_preserve_other: true
    material:
      min_visual_quality: 3
    color:
      min_visual_quality: 3
    global:
      min_visual_quality: 3
    addition:
      min_visual_quality: 3
