# =====================================================================
# Pipeline v3 — TRELLIS.2, 512 edit-resolution experiment (masked S1 + perstep S2)
# =====================================================================
# A/B sibling of pipeline_v3_trellis2_masked_posthoc_r1024.yaml (masked S1 +
# contact-soft + ss_align_t1 + posthoc S2, recipe R3) but at **512 edit
# resolution** instead of 1024.  See pipeline_v3_trellis2_flowedit_free_r512.yaml
# header for how 512 works (S1 stays 64³; S2 → _512 flow on 32³ + grid-512
# sidecar body; decode @512).
#
# Pre-3D stages REUSED from _exp_flowedit_free_r1024 (seed: symlink edits_2d/phase1/gate_views,
# copy edit_status.json); only encode (grid-512 sidecar) + trellis2_preview run.
# Compare against the 1024 masked result in _exp_masked_posthoc_r1024/.../edits_3d.
#
# Run:
#   OBJ_IDS_FILE=data/Pxform_v2/_exp_masked_posthoc_r512_pad0/smoke15_ids.txt FORCE=1 \
#   STAGES=trellis2_encode,trellis2_preview \
#   MACHINE_ENV=configs/machine/local_trellis2.env \
#     bash run_pipeline_v3_shard_trellis2.sh shard08_masked_e512 \
#          configs/pipeline_v3_trellis2_masked_posthoc_r512_pad0.yaml
# =====================================================================

blender: /mnt/zsn/zsn_workspace/VoxHammer/third_party/blender-4.2.19-linux-x64/blender
ckpt_root: /mnt/zsn/ckpts/TRELLIS.2-4B

data:
  output_dir: data/Pxform_v2/_exp_masked_perstep_r512_pad4_restore   # 512 + pad=4 + occupancy restore
  mesh_root:   data/partverse/inputs/mesh
  images_root: data/partverse/inputs/images

pipeline:
  gpus: [0, 1, 2, 3, 4, 5, 6, 7]   # all 8 GPUs → 8-way parallel 3D edit

  vlm_port_base: 8200
  vlm_port_stride: 1
  flux_port_base: 8020
  flux_port_stride: 1

  prerender_workers: 6
  s6p_del_workers: 6

  stages:
  - name: trellis2_encode
    desc: >
      TRELLIS.2 P1 — encode the ORIGINAL mesh.  trellis2_edit_res=512 ALSO writes
      the grid-512 sidecar (shape/tex_slat_e512.npz, 32³) for the S2 body anchor.
    servers: none
    use_gpus: true
    steps:
    - trellis2_encode

  - name: text_gen_gate_a
    desc: VLM edit generation (Mode A overview) + text-align gate.
    servers: vlm
    steps:
    - gen_edits
    - gate_text_align

  - name: flux_2d
    desc: FLUX 2D image editing.
    servers: flux
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 0
    steps:
    - flux_2d

  - name: gate_2d
    desc: Gate C — VLM judges each FLUX before→after pair.
    servers: vlm
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 1
    steps:
    - gate_2d

  - name: trellis2_preview
    desc: >
      TRELLIS.2 masked latent editing at 512 → edits_3d/<edit_id> latents +
      gate-E before/after named views.
    servers: none
    use_gpus: true
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 2
    steps:
    - trellis2_3d

services:
  vlm:
    model: /mnt/zsn/ckpts/Qwen3.6-27B

  image_edit:
    enabled: true
    image_edit_backend: local_diffusers
    workers_per_server: 2

    trellis2_codebase: /mnt/zsn/3dobject/TRELLIS.2
    trellis2_ckpt:     /mnt/zsn/ckpts/TRELLIS.2-4B

    use_mask: true

    # 512 edit resolution (vs 1024 in _exp_masked_posthoc_r1024).  Same recipe R3 otherwise:
    # masked S1 + contact-soft + TRELLIS.1 SS schedule, but S2 uses the masked
    # PER-STEP anchor (perstep), NOT posthoc — body kept by per-step mask + occupancy restore.
    trellis2_edit_res: 512
    trellis2_canonical_frame: true
    trellis2_s1_mode: masked
    trellis2_s1_contact_soft: true
    trellis2_ss_align_t1: true
    trellis2_s2_anchor_mode: perstep        # masked per-step anchor for S2 shape (NOT posthoc)
    # ── 512+pad4+restore experiment (full proposal) ──
    trellis2_s1_pad: 4                      # Chebyshev box-dilate the 64³ edit grid by 4
    trellis2_s2_restore_preserved: true     # re-insert source body voxels S1 dropped outside the mask
    trellis2_force_white_model: true        # shape-only: stop after S2 shape, decode grey 512 mesh (skip texture)

    trellis2_pipeline_type: 1024_cascade
    trellis2_seed: 1
    trellis2_num_samples: 1
    trellis2_decimation_target: 1000000
    trellis2_texture_size: 4096
    emit_before: true

    trellis2_emit_glb: false

    trellis2_render_gate_views: true
    trellis2_gate_view_res: 512
    trellis2_encode_render_overview: false

    trellis_workers_per_gpu: 1

qc:
  edit_types: [modification, scale]

  thresholds_by_type:
    deletion:
      min_visual_quality: 3
    modification:
      min_visual_quality: 3
      require_preserve_other: true
    scale:
      min_visual_quality: 3
      require_preserve_other: true
    material:
      min_visual_quality: 3
    color:
      min_visual_quality: 3
    global:
      min_visual_quality: 3
    addition:
      min_visual_quality: 3
