# =====================================================================
# Pipeline v3 — TRELLIS.2 t1ss-native masked edit @ **1024** (pad4, texrestore)
# =====================================================================
# 1024-resolution A/B sibling of the canonical production config
#   configs/pipeline_v3_trellis2_t1ss_native_r512_pad4_texrestore.yaml
# SAME recipe (S1 = native TRELLIS.1 SS flow + DINOv2 masked, pad=4 + same-frame
# restore; S2 SHAPE = masked per-step anchor; S2 TEXTURE = posthoc-RESTORE), the
# ONLY variable is edit resolution: 1024 instead of 512.
#
#   edit_res=1024  → SLat coord grid = 1024//16 = 64³ (the NATIVE TRELLIS.2 grid).
#   S2 reads the **main** p1_encode/{shape,tex}_slat.npz (64³) directly — NO
#   *_slat_e512 (32³) sidecar, NO grid-512 re-encode.  The texture posthoc-restore
#   hard-pastes the P1-encoded original tex_slat.npz (64³) onto preserved tokens
#   (suffix="" when edit_res==1024 → _load_p1_slat(...,which="tex") loads tex_slat.npz).
#
# REUSE: this tree is SEEDED from the canonical 512 tree
#   data/Pxform_v2/_exp_t1ss_native_r512_pad4_texrestore
# via scripts/experiments/seed_masked_e512_variant.sh — p1_encode / edits_2d /
# phase1 are symlinked (read-only), edits_3d + gate_views are fresh real dirs so
# the 1024 3D edit + before/after views regenerate without clobbering the 512 run.
# So ONLY the 3D-edit stage (+ optional Gate-E) re-runs here; encode/VLM/FLUX/gates
# are all reused.  A/B vs 512 on the SAME objects + SAME 2D edits.
#
# Run (reuse upstream, re-run only the GPU 3D-edit stage):
#   IDS=data/Pxform_v2/_exp_t1ss_native_r1024_pad4_texrestore/seeded_ids.txt
#   OBJ_IDS_FILE=$IDS STAGES=trellis2_preview,gate_quality FORCE=1 \
#   MACHINE_ENV=configs/machine/local_trellis2.env PIPELINE_GPUS="0,1,2,3,4,5,6,7" \
#     bash run_pipeline_v3_shard_trellis2.sh shard08_r1024_texrestore \
#          configs/experiments/pipeline_v3_trellis2_t1ss_native_r1024_pad4_texrestore.yaml
#   (drop ,gate_quality for latents+views only; drop STAGES entirely to run from
#    scratch including encode/VLM/FLUX/gates into this tree.)
# =====================================================================

blender: /mnt/zsn/zsn_workspace/VoxHammer/third_party/blender-4.2.19-linux-x64/blender
ckpt_root: /mnt/zsn/ckpts/TRELLIS.2-4B

data:
  # SEPARATE 1024-edit output tree (sibling of the 512 canonical tree).
  output_dir: data/Pxform_v2/_exp_t1ss_native_r1024_pad4_texrestore
  mesh_root:   data/partverse/inputs/mesh
  images_root: data/partverse/inputs/images

pipeline:
  gpus: [0, 1, 2, 3, 4, 5, 6, 7]   # all 8 GPUs → 8-way parallel 3D edit

  vlm_port_base: 8200
  vlm_port_stride: 1
  flux_port_base: 8020
  flux_port_stride: 1

  prerender_workers: 6
  s6p_del_workers: 6

  stages:
  - name: trellis2_encode
    desc: >
      TRELLIS.2 P1 — encode the ORIGINAL mesh.  At edit_res=1024 only the 64³
      main shape/tex_slat.npz are needed (no *_slat_e512 sidecar).  When this tree
      is seeded from the 512 sibling, p1_encode is symlinked and this stage skips.
    servers: none
    use_gpus: true
    steps:
    - trellis2_encode

  - name: text_gen_gate_a
    desc: VLM edit generation (Mode A overview) + text-align gate.
    servers: vlm
    steps:
    - gen_edits
    - gate_text_align

  - name: flux_2d
    desc: FLUX 2D image editing.
    servers: flux
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 0
    steps:
    - flux_2d

  - name: gate_2d
    desc: Gate C — VLM judges each FLUX before→after pair.
    servers: vlm
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 1
    steps:
    - gate_2d

  - name: trellis2_preview
    desc: >
      TRELLIS.2 masked latent editing at 1024 → edits_3d/<edit_id> latents +
      gate-E before/after named views.
    servers: none
    use_gpus: true
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 2
    steps:
    - trellis2_3d

  - name: gate_quality
    desc: >
      Gate E — VLM visual-quality judge.  Reads the before/after named views
      produced by trellis2_preview (gate_views/before_view_*,
      edits_3d/<id>/after_view_*, both PbrMeshRenderer white bg), builds the
      2x5 before/after collage and scores each edit; writes gate_e pass/fail to
      edit_status.json / qc.json.  Own VLM batch after the 3D-edit chain.
    servers: vlm
    steps:
    - gate_quality

services:
  vlm:
    model: /mnt/zsn/ckpts/Qwen3.6-27B

  image_edit:
    enabled: true
    image_edit_backend: local_diffusers
    workers_per_server: 2

    trellis2_codebase: /mnt/zsn/3dobject/TRELLIS.2
    trellis2_ckpt:     /mnt/zsn/ckpts/TRELLIS.2-4B

    use_mask: true

    # ── 1024 edit resolution (vs 512 in the canonical config) ──
    # S2 SLat grid = 1024//16 = 64³ → reads the main shape/tex_slat.npz directly.
    # Recipe R3 otherwise IDENTICAL to the 512 canonical config: native T1-SS
    # masked S1 + contact-soft + pad4 + same-frame restore, S2 SHAPE per-step
    # anchor, S2 TEXTURE posthoc-restore.
    trellis2_edit_res: 1024
    trellis2_canonical_frame: true
    trellis2_s1_mode: masked
    trellis2_s1_contact_soft: true
    trellis2_ss_align_t1: true
    trellis2_s1_ss_model: t1                 # NATIVE in-process TRELLIS.1 SS flow + DINOv2 cond (no bridge)
    trellis2_s2_anchor_mode: perstep        # SHAPE: masked per-step anchor (solid edited part)
    trellis2_s2_tex_anchor_mode: posthoc    # TEXTURE: posthoc-RESTORE — hard-paste the P1-ENCODED
                                            #   original tex latent (tex_slat.npz, 64³ at edit_res=1024)
                                            #   onto preserved tokens → preserved region = EXACT original
                                            #   material, only edit region regenerates
    trellis2_s1_pad: 4                      # Chebyshev box-dilate the 64³ edit grid by 4
    trellis2_s2_restore_preserved: true     # re-insert source body voxels S1 dropped outside the mask
    # force_white_model OFF → S2 texture (masked_tex_slat, perstep) runs → textured 1024 mesh decode

    trellis2_seed: 1                        # masked-edit sampler seed
    trellis2_decimation_target: 1000000     # only used when trellis2_emit_glb: true
    trellis2_texture_size: 4096             # only used when trellis2_emit_glb: true
    emit_before: true

    trellis2_emit_glb: false   # GLB not needed — keep latents + after-views

    trellis2_render_gate_views: true
    trellis2_gate_view_res: 512
    trellis2_encode_render_overview: false

    trellis_workers_per_gpu: 1

qc:
  edit_types: [modification, scale]

  thresholds_by_type:
    deletion:
      min_visual_quality: 3
    modification:
      min_visual_quality: 3
      require_preserve_other: true
    scale:
      min_visual_quality: 3
      require_preserve_other: true
    material:
      min_visual_quality: 3
    color:
      min_visual_quality: 3
    global:
      min_visual_quality: 3
    addition:
      min_visual_quality: 3
