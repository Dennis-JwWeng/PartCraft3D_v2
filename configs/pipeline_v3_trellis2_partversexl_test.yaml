# PartVerse XL smoke / test config for Trellis2 pipeline.
# Pack inputs first:
#   python scripts/data_prep/partverse/pack_npz_xl.py \
#     --data-root /mnt/zsn/data/partversexl --shard 00 --num-shards 10 --limit 5
#
# Run one shard (adjust MACHINE_ENV / GPUS for your host):
#   SHARD=00 bash run_pipeline_v3_shard_trellis2.sh xl_test \
#     configs/pipeline_v3_trellis2_partversexl_test.yaml

blender: /mnt/zsn/zsn_workspace/VoxHammer/third_party/blender-4.2.19-linux-x64/blender
ckpt_root: /mnt/zsn/ckpts/TRELLIS.2-4B

data:
  output_dir: data/Pxform_v2/partversexl_test
  mesh_root:   /mnt/zsn/data/partversexl/inputs/mesh
  images_root: /mnt/zsn/data/partversexl/inputs/images
  require_images_npz: false   # mesh-only XL pack; Trellis2 does not use prerender views
  anno_dir:    /mnt/zsn/data/partversexl/anno_info/anno_infos

pipeline:
  gpus: [0, 1, 2, 3]
  vlm_port_base: 8200
  vlm_port_stride: 1
  flux_port_base: 8020
  flux_port_stride: 1
  prerender_workers: 4
  s6p_del_workers: 4

  stages:
  - name: trellis2_encode
    servers: none
    use_gpus: true
    steps: [trellis2_encode]

  - name: text_gen_gate_a
    servers: vlm
    steps: [gen_edits, gate_text_align]

  - name: flux_2d
    servers: flux
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 0
    steps: [flux_2d]

  - name: trellis2_preview
    servers: none
    use_gpus: true
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 1
    steps: [trellis2_3d]

  - name: gate_quality
    servers: vlm
    steps: [gate_quality]

  - name: del_add
    servers: none
    use_gpus: true
    steps: [del_add]

services:
  vlm:
    model: /mnt/zsn/ckpts/Qwen3.6-27B
  image_edit:
    enabled: true
    image_edit_backend: local_diffusers
    workers_per_server: 2
    trellis2_codebase: /mnt/zsn/3dobject/TRELLIS.2
    trellis2_ckpt: /mnt/zsn/ckpts/TRELLIS.2-4B
    use_mask: true
    trellis2_edit_res: 512
    trellis2_canonical_frame: true
    trellis2_s1_mode: masked
    trellis2_s1_contact_soft: true
    trellis2_ss_align_t1: true
    trellis2_s1_ss_model: t1
    trellis2_s2_anchor_mode: posthoc
    trellis2_s2_tex_anchor_mode: posthoc
    trellis2_s1_pad: 4
    trellis2_s2_restore_preserved: true
    trellis2_seed: 1
    trellis2_emit_glb: false
    trellis2_render_gate_views: true
    trellis2_gate_view_res: 512
    trellis2_encode_render_overview: true
    trellis_workers_per_gpu: 1
    emit_before: true

qc:
  edit_types: [modification, scale]
  thresholds_by_type:
    modification:
      min_visual_quality: 3
      require_preserve_other: true
    scale:
      min_visual_quality: 3
      require_preserve_other: true
